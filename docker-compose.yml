services:
  db:
    image: postgres:16
    container_name: fluxurl-db
    environment:
      POSTGRES_USER: fluxurl
      POSTGRES_PASSWORD: fluxurl
      POSTGRES_DB: fluxurl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxurl -d fluxurl"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
