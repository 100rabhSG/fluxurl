[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic auto-generates migration files from a stock template; not worth linting.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
# B008: FastAPI's Depends/Query/etc. are designed to be used as default args.
ignore = ["B008"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"